name: reusable-build
on:
  workflow_call:
    inputs:
      python-version:
        type: string
        required: false
        default: '3.12'
      x86:
        type: boolean
        required: false
        default: false
      arm:
        type: boolean
        required: false
        default: false

jobs:
  build-1:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'
      - name: Prepare
        uses: ./.github/actions/prepare
        with:
          python-version: ${{ inputs.python-version }}
      - name: Run Stage
        id: stage
        uses: ./.github/actions/stage
        with:
          finished: false
          from_artifact: false
          x86: ${{ inputs.x86 }}
          arm: ${{ inputs.arm }}
    outputs:
      finished: ${{ steps.stage.outputs.finished }}
  build-2:
    needs: build-1
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'
      - name: Prepare
        uses: ./.github/actions/prepare
        with:
          python-version: ${{ inputs.python-version }}
      - name: Run Stage
        id: stage
        uses: ./.github/actions/stage
        with:
          finished: ${{ join(needs.*.outputs.finished) }}
          from_artifact: true
          x86: ${{ inputs.x86 }}
          arm: ${{ inputs.arm }}
    outputs:
      finished: ${{ steps.stage.outputs.finished }}
